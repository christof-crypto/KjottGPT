<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KjøttGPT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Söhne', 'ui-sans-serif', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background-color: #212121;
            color: #ececec;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Landing view */
        .landing {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s;
        }

        .landing.hidden {
            display: none;
        }

        .landing h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #ececec;
        }

        .logo-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        /* Chat view */
        .chat-view {
            flex: 1;
            display: none;
            flex-direction: column;
            max-width: 768px;
            width: 100%;
            margin: 0 auto;
        }

        .chat-view.active {
            display: flex;
        }

        .chat-header {
            padding: 12px 16px;
            text-align: center;
            border-bottom: 1px solid #353535;
        }

        .chat-header span {
            font-size: 1rem;
            font-weight: 600;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 100%;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .message-avatar.user {
            background: #5b5fc7;
        }

        .message-avatar.assistant {
            background: #c4302b;
        }

        .message-content {
            padding-top: 4px;
            line-height: 1.6;
            font-size: 1rem;
            white-space: pre-wrap;
        }

        .thinking-indicator {
            display: block;
            font-size: 1.2rem;
            margin-top: 8px;
            letter-spacing: 4px;
        }

        /* Input area */
        .input-area {
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .input-wrapper {
            width: 100%;
            max-width: 768px;
            background: #2f2f2f;
            border-radius: 24px;
            padding: 12px 16px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            border: 1px solid #424242;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #565656;
        }

        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #ececec;
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 200px;
            line-height: 1.5;
            rows: 1;
        }

        .input-wrapper textarea::placeholder {
            color: #8e8ea0;
        }

        .send-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #ececec;
            color: #212121;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #ffffff;
        }

        .send-btn:disabled {
            background: #424242;
            color: #8e8ea0;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 16px;
            height: 16px;
        }

        .disclaimer {
            text-align: center;
            font-size: 0.75rem;
            color: #8e8ea0;
            padding: 8px 16px 16px;
        }
    </style>
</head>
<body>

    <!-- Landing -->
    <div class="landing" id="landing">
        <div class="logo-icon">🥩</div>
        <h1>KjøttGPT</h1>
    </div>

    <!-- Chat -->
    <div class="chat-view" id="chatView">
        <div class="chat-header">
            <span>🥩 KjøttGPT</span>
        </div>
        <div class="messages" id="messages"></div>
    </div>

    <!-- Input -->
    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="input" rows="1" placeholder="Spør KjøttGPT om hva som helst..." autofocus></textarea>
            <button class="send-btn" id="sendBtn" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"></line>
                    <polyline points="5 12 12 5 19 12"></polyline>
                </svg>
            </button>
        </div>
    </div>
    <div class="disclaimer">KjøttGPT er en kjøttbasert AI. Alle svar er garantert useriøse.</div>

    <script>
        const landing = document.getElementById('landing');
        const chatView = document.getElementById('chatView');
        const messages = document.getElementById('messages');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');

        let isProcessing = false;

        const RESPONSES = [
            { text: 'Drekker du ikke eller?!' },
            { text: 'Har du rust på moooobilen?' },
            { text: 'Jeg er ikke fem år jeg er ølløv' },
            {
                text: 'Vet du hvilken tresort det finnes flest av i Østfold?',
                followUp: 'Halvlitrær',
                followUpDelay: 5000
            },
            { text: 'Brattås AS; voldsomt til rør' },
            { text: 'Ahh forme' },
            { text: 'Ein schwei fei' },
            { text: 'Double penetration' },
        ];

        // Auto-resize textarea
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 200) + 'px';
            sendBtn.disabled = !input.value.trim() || isProcessing;
        });

        // Send on Enter (shift+enter for newline)
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (input.value.trim() && !isProcessing) send();
            }
        });

        sendBtn.addEventListener('click', () => {
            if (input.value.trim() && !isProcessing) send();
        });

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'message';

            const avatar = document.createElement('div');
            avatar.className = `message-avatar ${role}`;
            avatar.textContent = role === 'user' ? '👤' : '🥩';

            const content = document.createElement('div');
            content.className = 'message-content';
            if (text) content.textContent = text;

            div.appendChild(avatar);
            div.appendChild(content);
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;

            return content;
        }

        function createThinkingIndicator() {
            const container = document.createElement('div');
            container.className = 'thinking-indicator';
            return container;
        }

        function startAubergineAnimation(indicator) {
            let count = 0;
            const interval = setInterval(() => {
                count = (count % 3) + 1; // cycles 1, 2, 3, 1, 2, 3...
                indicator.textContent = '🍆'.repeat(count);
            }, 500);
            indicator.textContent = '🍆';
            return interval;
        }

        async function send() {
            const text = input.value.trim();
            if (!text) return;

            isProcessing = true;
            sendBtn.disabled = true;

            // Switch to chat view
            landing.classList.add('hidden');
            chatView.classList.add('active');

            // User message
            addMessage('user', text);
            input.value = '';
            input.style.height = 'auto';

            // Pick random response
            const response = RESPONSES[Math.floor(Math.random() * RESPONSES.length)];

            // Thinking message with aubergine indicator
            const thinkContent = addMessage('assistant', 'Det var et godt spørsmål... la meg tenke litt!');
            const indicator = createThinkingIndicator();
            thinkContent.appendChild(indicator);
            const animInterval = startAubergineAnimation(indicator);

            // Wait 10 seconds
            await new Promise(r => setTimeout(r, 10000));

            // Show answer
            clearInterval(animInterval);
            indicator.remove();
            thinkContent.textContent = 'Det var et godt spørsmål... la meg tenke litt!\n\n' + response.text;
            messages.scrollTop = messages.scrollHeight;

            // If this response has a follow-up (tresort -> halvlitrær)
            if (response.followUp) {
                const indicator2 = createThinkingIndicator();
                thinkContent.appendChild(indicator2);
                const animInterval2 = startAubergineAnimation(indicator2);

                await new Promise(r => setTimeout(r, response.followUpDelay));

                clearInterval(animInterval2);
                indicator2.remove();
                thinkContent.textContent += '\n\n' + response.followUp;
                messages.scrollTop = messages.scrollHeight;
            }

            isProcessing = false;
            sendBtn.disabled = !input.value.trim();
            input.focus();
        }
    </script>
</body>
</html>
